<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Storage</title>
</head>
<body>
    <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; width: 100vw;">
        
        <div class="card" style="width: 100%; max-width: 450px; text-align: center; box-sizing: border-box;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🔐</div>
            <h1 style="margin-bottom: 0.5rem;">Secure File Storage</h1>
            <p style="color: var(--text-muted); margin-bottom: 2.5rem; font-size: 0.95rem;">
                A professional-grade platform for encrypted file sharing and storage.
            </p>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <a href="{{ url_for('login') }}" class="btn" style="margin: 0;">Login</a>
                <a href="{{ url_for('register') }}" class="btn" style="margin: 0; background-color: white; color: var(--primary); border: 2px solid var(--primary);">Register</a>
            </div>

            <div style="margin-top: 2.5rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">
                <small style="color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px;">
                    Protected by AES-256 Encryption
                </small>
            </div>
        </div>

    </div>
</body>
</html>
