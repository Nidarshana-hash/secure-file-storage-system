<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secure Storage</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        /* Forces the form to the center of the screen and limits width */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .container {
            width: 100%;
            max-width: 400px; /* Keeps the form professional and compact */
            padding: 20px;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        h1 { 
            font-size: 1.75rem; 
            text-align: center; 
            margin-bottom: 0.5rem; 
            color: #1e293b;
        }

        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 8px; 
            font-size: 0.9rem; 
            color: #475569;
        }

        input[type="text"], 
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box; /* Crucial: prevents width stretching */
            background: #f1f5f9;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }

        .footer-link {
            margin-top: 1.5rem;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.5rem;
            font-size: 0.9rem;
            color: #64748b;
        }

        .footer-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Login</h1>
            <p style="text-align: center; color: #64748b; margin-bottom: 2rem; font-size: 0.9rem;">
                Access your secure encrypted storage.
            </p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div style="padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; text-align: center; background: #fee2e2; color: #ef4444;">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="post">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>

                <input type="submit" value="Login" class="btn">
            </form>

            <div class="footer-link">
                Don't have an account? <a href="{{ url_for('register') }}">Register</a>
            </div>
        </div>
    </div>
</body>
</html>
